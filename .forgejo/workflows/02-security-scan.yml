name: Security Scan

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: security-${{ forgejo.ref }}
  cancel-in-progress: true

env:
  TRIVY_IMAGE: ghcr.io/aquasecurity/trivy:0.69.3

jobs:
  scan:
    runs-on: docker
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Ensure Docker tooling is available
        shell: bash
        run: |
          set -euo pipefail

          if command -v docker >/dev/null 2>&1; then
            exit 0
          fi

          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache docker-cli curl git
          elif command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends ca-certificates curl git docker.io
            rm -rf /var/lib/apt/lists/*
          else
            echo "Docker tooling is missing and this runner image is not supported automatically." >&2
            exit 1
          fi

          command -v docker >/dev/null 2>&1 || {
            echo "Docker CLI is still unavailable after installation." >&2
            exit 1
          }

      - name: Verify Docker daemon access
        shell: bash
        run: |
          set -euo pipefail

          if docker info >/tmp/unifi-bl-docker-info.log 2>&1; then
            cat /tmp/unifi-bl-docker-info.log
            exit 0
          fi

          cat /tmp/unifi-bl-docker-info.log >&2 || true
          echo >&2
          echo "Docker CLI is available, but no Docker daemon was exposed to this job." >&2
          echo "Configure the Forgejo runner with one of these supported options:" >&2
          echo "- container.docker_host: automount" >&2
          echo "- runner.envs.DOCKER_HOST plus container.docker_host pointing to a dedicated Docker-in-Docker daemon" >&2
          exit 1

      - name: Show Docker versions
        shell: bash
        run: |
          set -euo pipefail
          docker version

      - name: Scan repository for secrets
        shell: bash
        run: |
          set -euo pipefail

          scan_container="$(docker create \
            zricethezav/gitleaks:latest \
            detect \
            --source /tmp/work \
            --verbose \
            --redact \
            --no-banner \
            --exit-code 1)"

          cleanup() {
            docker rm -f "$scan_container" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          docker cp . "$scan_container:/tmp/work"
          docker start -a "$scan_container"

      - name: Build image for vulnerability scan
        shell: bash
        run: |
          set -euo pipefail

          docker build --pull -t unifi-bl-security-scan:${FORGEJO_SHA::7} .
          docker save "unifi-bl-security-scan:${FORGEJO_SHA::7}" -o unifi-bl-security-scan.tar

      - name: List application files embedded in security scan image
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm --entrypoint sh "unifi-bl-security-scan:${FORGEJO_SHA::7}" -lc '
            echo "Embedded application files under /app:"
            find /app -mindepth 1 | sort
            if [ -e /app/docs/forgejo-actions.md ]; then
              echo "docs/forgejo-actions.md must not be embedded in the image." >&2
              exit 1
            fi
            echo
            echo "OK: docs/forgejo-actions.md is not embedded in the image."
          '

      - name: Scan image for critical vulnerabilities
        shell: bash
        run: |
          set -euo pipefail

          scan_container="$(docker create \
            "$TRIVY_IMAGE" \
            image \
            --input /tmp/unifi-bl-security-scan.tar \
            --scanners vuln \
            --severity CRITICAL \
            --ignore-unfixed \
            --no-progress \
            --exit-code 1)"

          cleanup() {
            docker rm -f "$scan_container" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          docker cp unifi-bl-security-scan.tar "$scan_container:/tmp/unifi-bl-security-scan.tar"
          docker start -a "$scan_container"

      - name: Cleanup security scan artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f unifi-bl-security-scan.tar
          docker image rm -f "unifi-bl-security-scan:${FORGEJO_SHA::7}" >/dev/null 2>&1 || true
