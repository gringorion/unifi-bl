name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ forgejo.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: docker
    timeout-minutes: 30
    env:
      DOCKER_HOST: tcp://docker:2375
      DOCKER_TLS_CERTDIR: ""
    services:
      docker:
        image: docker:27-dind
        env:
          DOCKER_TLS_CERTDIR: ""
        options: --privileged
    steps:
      - name: Checkout repository
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Ensure Docker tooling is available
        shell: bash
        run: |
          set -euo pipefail

          if command -v docker >/dev/null 2>&1; then
            if docker compose version >/dev/null 2>&1 || command -v docker-compose >/dev/null 2>&1; then
              exit 0
            fi
          fi

          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache docker-cli docker-cli-compose curl git
          elif command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends ca-certificates curl git docker.io docker-compose
            rm -rf /var/lib/apt/lists/*
          else
            echo "Docker tooling is missing and this runner image is not supported automatically." >&2
            exit 1
          fi

          command -v docker >/dev/null 2>&1 || {
            echo "Docker CLI is still unavailable after installation." >&2
            exit 1
          }

      - name: Wait for Docker daemon
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              exit 0
            fi

            echo "Waiting for Docker daemon on ${DOCKER_HOST} (attempt ${attempt}/30)..."
            sleep 2
          done

          docker version || true
          echo "Docker daemon did not become ready." >&2
          exit 1

      - name: Show Docker versions
        shell: bash
        run: |
          set -euo pipefail
          docker version
          docker info
          if docker compose version >/dev/null 2>&1; then
            docker compose version
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose version
          fi

      - name: Validate publish secrets
        shell: bash
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            REGISTRY
            IMAGE_NAME
            REGISTRY_USERNAME
            REGISTRY_PASSWORD
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Build and push latest plus short SHA tags
        shell: bash
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          short_sha="${FORGEJO_SHA::7}"
          image_ref="${REGISTRY%/}/${IMAGE_NAME}"

          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin

          docker build --pull \
            -t "${image_ref}:latest" \
            -t "${image_ref}:sha-${short_sha}" \
            .

          docker push "${image_ref}:latest"
          docker push "${image_ref}:sha-${short_sha}"

          if [[ -n "${FORGEJO_STEP_SUMMARY:-}" ]]; then
            {
              echo "## Docker publish"
              echo
              echo "- Image: \`${image_ref}\`"
              echo "- Tags pushed:"
              echo "  - \`latest\`"
              echo "  - \`sha-${short_sha}\`"
            } >> "$FORGEJO_STEP_SUMMARY"
          fi
