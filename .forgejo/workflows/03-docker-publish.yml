name: Docker Publish

on:
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ forgejo.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: docker
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Ensure Docker tooling is available
        shell: bash
        run: |
          set -euo pipefail

          if command -v docker >/dev/null 2>&1; then
            if docker compose version >/dev/null 2>&1 || command -v docker-compose >/dev/null 2>&1; then
              exit 0
            fi
          fi

          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache docker-cli docker-cli-compose curl git
          elif command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends ca-certificates curl git docker.io docker-compose
            rm -rf /var/lib/apt/lists/*
          else
            echo "Docker tooling is missing and this runner image is not supported automatically." >&2
            exit 1
          fi

          command -v docker >/dev/null 2>&1 || {
            echo "Docker CLI is still unavailable after installation." >&2
            exit 1
          }

      - name: Verify Docker daemon access
        shell: bash
        run: |
          set -euo pipefail

          if docker info >/tmp/unifi-bl-docker-info.log 2>&1; then
            cat /tmp/unifi-bl-docker-info.log
            exit 0
          fi

          cat /tmp/unifi-bl-docker-info.log >&2 || true
          echo >&2
          echo "Docker CLI is available, but no Docker daemon was exposed to this job." >&2
          echo "Configure the Forgejo runner with one of these supported options:" >&2
          echo "- container.docker_host: automount" >&2
          echo "- runner.envs.DOCKER_HOST plus container.docker_host pointing to a dedicated Docker-in-Docker daemon" >&2
          exit 1

      - name: Show Docker versions
        shell: bash
        run: |
          set -euo pipefail
          docker version
          if docker compose version >/dev/null 2>&1; then
            docker compose version
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose version
          fi

      - name: Validate publish secrets
        shell: bash
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            REGISTRY
            IMAGE_NAME
            REGISTRY_USERNAME
            REGISTRY_PASSWORD
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Read application version
        shell: bash
        run: |
          set -euo pipefail

          app_version="$(tr -d '\n' < VERSION)"
          package_version="$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' package.json | head -n 1)"

          if [[ -z "$app_version" || -z "$package_version" ]]; then
            echo "Unable to read VERSION or package.json version." >&2
            exit 1
          fi

          if [[ "$app_version" != "$package_version" ]]; then
            echo "VERSION (${app_version}) does not match package.json (${package_version})." >&2
            exit 1
          fi

          printf '%s' "$app_version" > .app-version

      - name: Build publish image
        shell: bash
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          app_version="$(cat .app-version)"
          image_ref="${REGISTRY%/}/${IMAGE_NAME}"

          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin

          docker build --pull \
            -t "${image_ref}:latest" \
            -t "${image_ref}:${app_version}" \
            .

      - name: List application files embedded in publish image
        shell: bash
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
        run: |
          set -euo pipefail

          image_ref="${REGISTRY%/}/${IMAGE_NAME}"
          app_version="$(tr -d '\n' < VERSION)"

          docker run --rm --entrypoint sh "${image_ref}:${app_version}" -lc '
            echo "Embedded application files under /app:"
            find /app -mindepth 1 | sort
            if [ -e /app/docs/forgejo-actions.md ]; then
              echo "docs/forgejo-actions.md must not be embedded in the image." >&2
              exit 1
            fi
            echo
            echo "OK: docs/forgejo-actions.md is not embedded in the image."
          '

      - name: Push latest and version tags
        shell: bash
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          app_version="$(tr -d '\n' < VERSION)"
          image_ref="${REGISTRY%/}/${IMAGE_NAME}"

          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin

          docker push "${image_ref}:latest"
          docker push "${image_ref}:${app_version}"

          if [[ -n "${FORGEJO_STEP_SUMMARY:-}" ]]; then
            {
              echo "## Docker publish"
              echo
              echo "- Image: \`${image_ref}\`"
              echo "- Tags pushed:"
              echo "  - \`latest\`"
              echo "  - \`${app_version}\`"
            } >> "$FORGEJO_STEP_SUMMARY"
          fi

      - name: Sync filtered public GitHub mirror
        shell: bash
        env:
          PUBLIC_GITHUB_REMOTE_URL: ${{ secrets.PUBLIC_GITHUB_REMOTE_URL }}
          PUBLIC_GITHUB_USERNAME: ${{ secrets.PUBLIC_GITHUB_USERNAME }}
          PUBLIC_GITHUB_TOKEN: ${{ secrets.PUBLIC_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${FORGEJO_REF_NAME:-}" != "main" ]]; then
            echo "Skipping the public GitHub mirror sync outside the main branch."
            exit 0
          fi

          if [[ -z "${PUBLIC_GITHUB_REMOTE_URL:-}" ]]; then
            echo "Skipping the public GitHub mirror sync: PUBLIC_GITHUB_REMOTE_URL is not configured."
            exit 0
          fi

          if [[ -z "${PUBLIC_GITHUB_TOKEN:-}" ]]; then
            echo "Failing the public GitHub mirror sync: PUBLIC_GITHUB_TOKEN must be configured with a GitHub personal access token. Account passwords are not supported." >&2
            exit 1
          fi

          SYNC_PUBLIC_REMOTE_NAME=github-public \
          SYNC_PUBLIC_REMOTE_URL="${PUBLIC_GITHUB_REMOTE_URL}" \
          SYNC_PUBLIC_AUTH_USERNAME="${PUBLIC_GITHUB_USERNAME}" \
          SYNC_PUBLIC_AUTH_TOKEN="${PUBLIC_GITHUB_TOKEN}" \
          SYNC_PUBLIC_ALLOW_UNTRACKED=true \
          SYNC_PUBLIC_REFRESH_SCREENSHOT=false \
          bash scripts/sync-origin-public.sh
