name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ forgejo.ref }}
  cancel-in-progress: true

jobs:
  docker-smoke:
    runs-on: docker
    timeout-minutes: 25
    env:
      CI_HOST_PORT: "18080"
      CI_IMAGE_TAG: unifi-bl:ci-${{ forgejo.run_number }}
      CI_CONTAINER_NAME: unifi-bl-ci-${{ forgejo.run_number }}
    steps:
      - name: Checkout repository
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Ensure Docker tooling is available
        shell: bash
        run: |
          set -euo pipefail

          if command -v docker >/dev/null 2>&1; then
            if docker compose version >/dev/null 2>&1 || command -v docker-compose >/dev/null 2>&1; then
              exit 0
            fi
          fi

          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache docker-cli docker-cli-compose curl git
          elif command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends ca-certificates curl git docker.io docker-compose
            rm -rf /var/lib/apt/lists/*
          else
            echo "Docker tooling is missing and this runner image is not supported automatically." >&2
            exit 1
          fi

          command -v docker >/dev/null 2>&1 || {
            echo "Docker CLI is still unavailable after installation." >&2
            exit 1
          }

      - name: Verify Docker daemon access
        shell: bash
        run: |
          set -euo pipefail

          if docker info >/tmp/unifi-bl-docker-info.log 2>&1; then
            cat /tmp/unifi-bl-docker-info.log
            exit 0
          fi

          cat /tmp/unifi-bl-docker-info.log >&2 || true
          echo >&2
          echo "Docker CLI is available, but no Docker daemon was exposed to this job." >&2
          echo "Configure the Forgejo runner with one of these supported options:" >&2
          echo "- container.docker_host: automount" >&2
          echo "- runner.envs.DOCKER_HOST plus container.docker_host pointing to a dedicated Docker-in-Docker daemon" >&2
          exit 1

      - name: Show runner and Docker versions
        shell: bash
        run: |
          set -euo pipefail

          echo "Runner:"
          uname -a || true

          echo
          echo "Docker:"
          docker version

          echo
          echo "Docker Compose:"
          if docker compose version >/dev/null 2>&1; then
            docker compose version
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose version
          else
            echo "Docker Compose is not available on this runner." >&2
            exit 1
          fi

      - name: Verify critical files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            Dockerfile
            docker-compose.yml
            .env.example
            package.json
            VERSION
            src/server.js
            docs/forgejo-actions.md
          )

          for path in "${required_files[@]}"; do
            if [[ ! -e "$path" ]]; then
              echo "Missing required file: $path" >&2
              exit 1
            fi

            echo "OK: $path"
          done

          [[ -d data ]] || { echo "Missing data directory." >&2; exit 1; }
          echo "OK: data/"

      - name: Create CI environment file
        shell: bash
        run: |
          set -euo pipefail

          cp .env.example .env

          upsert_env() {
            local key="$1"
            local value="$2"

            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${value}|" .env
            else
              printf '%s=%s\n' "$key" "$value" >> .env
            fi
          }

          upsert_env PORT "8080"
          upsert_env CI_HOST_PORT "$CI_HOST_PORT"
          upsert_env APP_TITLE "UniFi Blocklists CI"
          upsert_env APP_AUTH_USERNAME "gringorion"
          upsert_env APP_AUTH_PASSWORD "ci-password"
          upsert_env APP_AUTH_PASSWORD_SEED "ci-password-seed"
          upsert_env ALLOW_INSECURE_TLS "false"
          upsert_env UNIFI_NETWORK_BASE_URL "https://192.0.2.1/proxy/network/integration/v1"
          upsert_env UNIFI_NETWORK_API_KEY "ci-fake-unifi-api-key"
          upsert_env UNIFI_SITE_ID "ci-site"
          upsert_env UNIFI_BLOCKLISTS_MAX_ENTRIES "4000"
          upsert_env UNIFI_FIREWALL_POLICY_NAME "unifi-bl - block enabled lists"

          echo ".env prepared for CI."

      - name: Validate runtime compose file
        shell: bash
        run: |
          set -euo pipefail

          compose() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            else
              docker-compose "$@"
            fi
          }

          compose -f docker-compose.yml config >/tmp/unifi-bl.compose.yml

          echo "Rendered compose file:"
          ls -l /tmp/unifi-bl.compose.yml

      - name: Build CI image
        shell: bash
        run: |
          set -euo pipefail
          docker build --pull -t "$CI_IMAGE_TAG" .

      - name: List application files embedded in CI image
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm --entrypoint sh "$CI_IMAGE_TAG" -lc '
            echo "Embedded application files under /app:"
            find /app -mindepth 1 | sort
            if [ -e /app/docs/forgejo-actions.md ]; then
              echo "docs/forgejo-actions.md must not be embedded in the image." >&2
              exit 1
            fi
            echo
            echo "OK: docs/forgejo-actions.md is not embedded in the image."
          '

      - name: Start CI container
        shell: bash
        run: |
          set -euo pipefail
          docker run -d \
            --name "$CI_CONTAINER_NAME" \
            --env-file .env \
            -p "${CI_HOST_PORT}:8080" \
            "$CI_IMAGE_TAG"

      - name: Smoke test container
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            running="$(docker inspect -f '{{.State.Running}}' "$CI_CONTAINER_NAME")"
            echo "Attempt ${attempt}: running=${running}"

            if [[ "$running" != "true" ]]; then
              echo "Container exited before smoke test completed." >&2
              docker logs "$CI_CONTAINER_NAME" || true
              exit 1
            fi

            if docker exec "$CI_CONTAINER_NAME" sh -lc "
              if command -v wget >/dev/null 2>&1; then
                wget -qO- 'http://127.0.0.1:8080/api/health' >/tmp/unifi-health.json
              elif command -v curl >/dev/null 2>&1; then
                curl -fsS 'http://127.0.0.1:8080/api/health' >/tmp/unifi-health.json
              else
                exit 1
              fi
            "; then
              break
            fi

            sleep 2
          done

          http_get_from_app() {
            local path="$1"

            docker exec "$CI_CONTAINER_NAME" sh -lc "
              if command -v wget >/dev/null 2>&1; then
                wget -qO- 'http://127.0.0.1:8080${path}'
              elif command -v curl >/dev/null 2>&1; then
                curl -fsS 'http://127.0.0.1:8080${path}'
              else
                echo 'Neither wget nor curl is available inside the app container.' >&2
                exit 1
              fi
            "
          }

          health_payload="$(http_get_from_app "/api/health")"
          session_payload="$(http_get_from_app "/api/session")"

          echo "Health endpoint:"
          echo "$health_payload"

          echo
          echo "Session endpoint:"
          echo "$session_payload"

          grep -q '"ok": true' <<<"$health_payload" || {
            echo "Health endpoint did not report ok=true." >&2
            exit 1
          }

          grep -q '"version"' <<<"$session_payload" || {
            echo "Session endpoint did not expose the app version." >&2
            exit 1
          }

      - name: Capture sanitized UI screenshot
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/capture-ci-screenshot.sh

      - name: Dump compose state on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail

          echo "docker ps -a"
          docker ps -a || true

          echo
          echo "container inspect"
          docker inspect "$CI_CONTAINER_NAME" || true

          echo
          echo "container logs"
          docker logs "$CI_CONTAINER_NAME" || true

      - name: Cleanup CI stack
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker rm -f "$CI_CONTAINER_NAME" >/dev/null 2>&1 || true
          docker image rm -f "$CI_IMAGE_TAG" >/dev/null 2>&1 || true
          rm -f .env
